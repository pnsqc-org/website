<!-- meta
title: Paper Presenters - 2025 - Archive - PNSQC
description: Browse the paper presenters represented in the PNSQC 2025 proceedings archive.
og_image: /images/events/conference/2025/paper_presentation.jpg
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/css/site.css" />
    <link rel="icon" type="image/jpg" href="/images/brand/pnsqc-logo.jpg" />
  </head>
  <body class="has-fixed-header bg-pnsqc-navy text-white antialiased">
    <!-- ============================================================
       HEADER (from src/_partials/header.html)
       ============================================================ -->
    <header></header>

    <section class="page-section">
      <div class="page-shell">
        <div class="mb-10">
          <p
            class="gold-readable--tinted inline-flex items-center rounded-full border border-pnsqc-gold/20 bg-pnsqc-gold/10 px-4 py-2 text-xs font-semibold uppercase tracking-[0.18em] text-pnsqc-gold"
          >
            Archive
          </p>
          <h1
            class="mt-5 bg-gradient-to-r from-pnsqc-gold to-pnsqc-gold-light bg-clip-text text-4xl font-bold text-transparent sm:text-5xl"
          >
            Paper Presenters
          </h1>
        </div>

        <div
          class="mx-auto mb-12 max-w-4xl overflow-hidden rounded-2xl border border-pnsqc-gold/20 bg-gradient-to-br from-amber-50 via-orange-50 to-teal-50 shadow-2xl"
        >
          <img
            src="/images/events/conference/2025/group_photo.jpg"
            alt="Software quality professionals collaborating"
            class="h-auto w-full"
          />
        </div>

        <div
          data-program-directory
          data-program-fallback-avatar="/images/brand/pnsqc-logo-2025.jpg"
        >
          <p class="text-center text-sm text-pnsqc-slate" data-program-status>
            Loading 2025 paper presenters...
          </p>

          <div class="gold-readable-surface mt-10 space-y-16" data-program-sections></div>

          <div class="hidden" aria-hidden="true" data-program-templates></div>
        </div>
      </div>
    </section>

    <!-- ============================================================
       FOOTER (from src/_partials/footer.html)
       ============================================================ -->
    <footer></footer>

    <script src="/js/program-slugs.js" defer></script>
    <script src="/js/program-data.js" defer></script>
    <script src="/js/program-renderer.js" defer></script>
    <script src="/js/program-directory.js" defer></script>
    <script src="/js/details-modal.js" defer></script>
  </body>
</html>

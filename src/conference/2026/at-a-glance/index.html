<!-- meta
title: Conference At-A-Glance - 2026 - Conference - PNSQC
description: Live schedule and session details for the PNSQC 2026 conference in Portland, Oregon.
og_image: /images/hero/hero-collaboration.png
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/css/site.css" />
    <link rel="icon" type="image/jpg" href="/images/brand/pnsqc-logo.jpg" />
  </head>
  <body class="has-fixed-header bg-pnsqc-navy text-white antialiased">
    <!-- ============================================================
       HEADER (from src/_partials/header.html)
       ============================================================ -->
    <header></header>

    <main
      data-program-schedule
      data-program-source="conference"
      data-program-year="2026"
      data-program-fallback-avatar="/images/brand/pnsqc-logo-2026.jpg"
    >
      <!-- ============================================================
       HERO
       ============================================================ -->
      <section class="page-section overflow-hidden">
        <div class="absolute inset-0 hero-gradient grid-overlay opacity-60"></div>
        <div class="relative page-shell">
          <div class="mb-10 text-center">
            <p
              class="mb-3 text-xs uppercase tracking-widest text-pnsqc-cyan"
              data-schedule-event-meta
            >
              10/12/2026 - 10/14/2026 | Portland, Oregon
            </p>
            <h1
              class="mb-4 bg-gradient-to-r from-pnsqc-gold to-pnsqc-gold-light bg-clip-text text-4xl font-extrabold text-transparent sm:text-5xl"
            >
              Conference At-A-Glance
            </h1>
            <p
              class="mx-auto max-w-2xl text-lg leading-relaxed text-pnsqc-slate"
              data-schedule-event-intro
            >
              Live schedule for PNSQC 2026 workshops, keynotes, and sessions.
            </p>
            <p class="mt-3 text-sm text-pnsqc-slate/60">
              Presentations, times, and locations are subject to change.
            </p>
          </div>

          <nav
            class="mb-6 flex flex-wrap justify-center gap-3"
            aria-label="Jump to day"
            data-schedule-day-nav
          >
            <span
              class="inline-flex items-center gap-2 rounded-full border border-white/20 px-5 py-2 text-sm font-semibold text-pnsqc-slate"
            >
              Loading day navigation...
            </span>
          </nav>

          <div
            class="mb-2 flex flex-wrap justify-center gap-2"
            aria-label="Timezone display"
            data-schedule-timezone-toggle
          >
            <button
              type="button"
              class="rounded-full border border-pnsqc-gold/40 px-4 py-2 text-xs font-semibold uppercase tracking-widest text-pnsqc-gold"
              data-timezone-option="local"
            >
              My Timezone
            </button>
            <button
              type="button"
              class="rounded-full border border-white/10 px-4 py-2 text-xs font-semibold uppercase tracking-widest text-pnsqc-slate transition-colors hover:border-white/30 hover:text-white"
              data-timezone-option="event"
            >
              Pacific Time
            </button>
          </div>
          <p class="mb-2 text-center text-xs text-pnsqc-slate/70" data-schedule-timezone-label></p>

          <div class="mb-6 mt-8">
            <h2 class="mb-4 text-center text-xl font-bold text-white">Conference Room Map</h2>
            <div class="mx-auto max-w-3xl">
              <img
                src="/images/events/conference/2026/university-place-map.jpg"
                alt="Conference room map for University Place"
                class="h-auto w-full rounded-lg border border-white/10 shadow-lg"
              />
            </div>
          </div>
        </div>
      </section>

      <!-- ============================================================
       SCHEDULE
       ============================================================ -->
      <section class="relative py-6">
        <div class="page-shell--wide">
          <div class="space-y-12" data-schedule-root>
            <div class="rounded-lg border border-pnsqc-gold/20 bg-pnsqc-blue/10 p-6">
              <p class="text-lg text-pnsqc-slate">Loading schedule...</p>
            </div>
          </div>
        </div>
      </section>

      <div class="hidden" data-schedule-templates></div>
    </main>

    <!-- ============================================================
       FOOTER (from src/_partials/footer.html)
       ============================================================ -->
    <footer></footer>

    <script src="/js/program-slugs.js" defer></script>
    <script src="/js/program-data.js" defer></script>
    <script src="/js/program-renderer.js" defer></script>
    <script src="/js/program-schedule.js" defer></script>
    <script src="/js/details-modal.js" defer></script>
  </body>
</html>

<!-- meta
title: Workshops — PNSQC 2026 Conference
description: Explore the Wednesday workshop lineup for PNSQC 2026, including instructors, abstracts, and speaker bios.
og_image: /images/events/conference/2025/group_photo.jpg
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/css/site.css" />
    <link rel="icon" type="image/jpg" href="/images/brand/pnsqc-logo.jpg" />
  </head>
  <body class="bg-pnsqc-navy text-white antialiased has-fixed-header">
    <!-- ============================================================
       HEADER (from src/_partials/header.html)
       ============================================================ -->
    <header></header>

    <!-- ============================================================
       PAGE HEADER
       ============================================================ -->
    <section class="page-section">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="max-w-4xl mx-auto mb-6">
          <p class="text-sm uppercase tracking-[0.2em] text-pnsqc-cyan mb-3">
            PNSQC 2026 Conference
          </p>
          <h1
            class="text-4xl sm:text-5xl font-bold bg-gradient-to-r from-pnsqc-gold to-pnsqc-gold-light bg-clip-text text-transparent mb-4"
          >
            Workshops
          </h1>
          <p class="text-pnsqc-slate text-lg leading-relaxed">
            Hands-on workshop sessions happening Wednesday, October 14, 2026, for quality engineers,
            testers, and leaders.
          </p>
        </div>

        <div class="mb-12 flex justify-center">
          <div class="max-w-4xl mx-auto">
            <img
              src="/images/events/conference/2025/workshop.jpg"
              alt="Workshops"
              class="w-auto h-auto rounded-lg shadow-lg mx-auto"
            />
          </div>
        </div>

        <div
          data-speaker-module
          data-speaker-endpoint="https://api.meetinghand.com/api/events/pnsqc-2026"
          data-speaker-fallback-avatar="/images/brand/pnsqc-logo.jpg"
          data-speaker-presentation-date="2026-10-14"
          data-speaker-default-label="Workshop"
          data-speaker-loading-text="Loading workshops..."
          data-speaker-error-text="Workshops will be announced soon."
        >
          <p class="text-center text-sm text-pnsqc-slate" data-speaker-status>
            Loading workshops...
          </p>

          <div class="mt-10 gold-readable-surface">
            <section data-speaker-default-section>
              <h2
                class="text-xs font-semibold uppercase tracking-widest text-pnsqc-gold mb-8 text-center"
                data-speaker-category-title
              >
                Workshops
              </h2>
              <div class="grid md:grid-cols-2 gap-8 max-w-5xl mx-auto" data-speaker-grid></div>
              <p class="text-pnsqc-slate text-sm italic text-center mt-6" data-speaker-empty hidden>
                Workshop speakers will be announced soon.
              </p>
            </section>
          </div>

          <div class="hidden" aria-hidden="true" data-speaker-templates></div>
        </div>
      </div>
    </section>

    <div class="fixed inset-0 z-50 hidden" data-track-modal>
      <div
        class="absolute inset-0 bg-pnsqc-navy/85 backdrop-blur-sm"
        data-track-modal-backdrop
      ></div>
      <div class="relative z-10 flex min-h-full items-center justify-center p-4">
        <div
          class="w-full max-w-3xl rounded-2xl border border-pnsqc-gold/25 bg-pnsqc-navy shadow-2xl"
          role="dialog"
          aria-modal="true"
          aria-labelledby="track-modal-title"
          data-track-modal-panel
        >
          <div
            class="border-b border-white/10 px-5 py-4 sm:px-6 sm:py-5 flex items-start justify-between gap-4"
          >
            <div>
              <p
                class="text-xs font-semibold uppercase tracking-widest text-pnsqc-gold/80"
                data-track-modal-label
              >
                Workshop
              </p>
              <h3
                id="track-modal-title"
                class="mt-1 text-lg sm:text-xl font-bold text-white"
                data-track-modal-title
              >
                Workshop Details
              </h3>
            </div>
            <button
              type="button"
              class="rounded-lg border border-white/10 p-2 text-pnsqc-slate hover:text-white hover:border-white/25 transition-colors"
              aria-label="Close workshop details"
              data-track-modal-close
            >
              <svg
                class="w-4 h-4"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
                aria-hidden="true"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M6 18L18 6M6 6l12 12"
                />
              </svg>
            </button>
          </div>
          <div
            class="max-h-[75vh] overflow-y-auto px-5 py-5 sm:px-6 sm:py-6"
            data-track-modal-body
          ></div>
        </div>
      </div>
    </div>

    <!-- ============================================================
       FOOTER (from src/_partials/footer.html)
       ============================================================ -->
    <footer></footer>

    <script src="/js/speakers-module.js" defer></script>
    <script src="/js/track-details-modal.js" defer></script>
  </body>
</html>

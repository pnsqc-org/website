<!-- meta
title: Keynotes & Invited Speakers — PNSQC 2026 Conference
description: Meet the invited speakers for PNSQC 2026, including 2025 Best Paper Award winner Kristine O'Connor.
og_image: /images/events/conference/2025/group_photo.jpg
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/css/site.css" />
    <link rel="icon" type="image/jpg" href="/images/brand/pnsqc-logo.jpg" />
  </head>
  <body class="bg-pnsqc-navy text-white antialiased has-fixed-header">
    <!-- ============================================================
       HEADER (from src/_partials/header.html)
       ============================================================ -->
    <header></header>

    <!-- ============================================================
       PAGE HEADER
       ============================================================ -->
    <section class="page-section">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="max-w-4xl mx-auto mb-6">
          <p class="text-sm uppercase tracking-[0.2em] text-pnsqc-cyan mb-3">
            PNSQC 2026 Conference
          </p>
          <h1
            class="text-4xl sm:text-5xl font-bold bg-gradient-to-r from-pnsqc-gold to-pnsqc-gold-light bg-clip-text text-transparent mb-4"
          >
            Keynotes &amp; Invited Speakers
          </h1>
          <p class="text-pnsqc-slate text-lg leading-relaxed">
            Featured keynote and invited speaker information for PNSQC 2026.
          </p>
        </div>

        <div class="mb-12 flex justify-center">
          <div class="max-w-4xl mx-auto">
            <img
              src="/images/events/conference/2025/invited_speaker.jpg"
              alt="Invited Speaker"
              class="w-auto h-auto rounded-lg shadow-lg mx-auto"
            />
          </div>
        </div>

        <div
          data-presenter-directory
          data-presenter-endpoint="https://api.meetinghand.com/api/events/pnsqc-2026"
          data-presenter-fallback-avatar="/images/brand/pnsqc-logo.jpg"
          data-presenter-exclude-presentation-date="2026-10-14"
        >
          <p class="text-center text-sm text-pnsqc-slate" data-presenter-status>
            Loading speakers...
          </p>

          <div class="mt-10 space-y-16 gold-readable-surface">
            <section data-presenter-category-id="111">
              <h2
                class="text-xs font-semibold uppercase tracking-widest text-pnsqc-gold mb-8 text-center"
                data-presenter-category-title
              >
                Keynote Speakers
              </h2>
              <div class="grid md:grid-cols-2 gap-8 max-w-5xl mx-auto" data-presenter-grid></div>
              <p
                class="text-pnsqc-slate text-sm italic text-center mt-6"
                data-presenter-empty
                hidden
              >
                More speakers to be announced
              </p>
            </section>

            <section data-presenter-category-id="104">
              <h2
                class="text-xs font-semibold uppercase tracking-widest text-pnsqc-cyan mb-8 text-center"
                data-presenter-category-title
              >
                Invited Speakers / Special Guests
              </h2>
              <div class="grid md:grid-cols-2 gap-8 max-w-5xl mx-auto" data-presenter-grid></div>
              <p
                class="text-pnsqc-slate text-sm italic text-center mt-6"
                data-presenter-empty
                hidden
              >
                More speakers to be announced
              </p>
            </section>
          </div>

          <div class="hidden" aria-hidden="true" data-presenter-templates></div>
        </div>
      </div>
    </section>

    <div class="fixed inset-0 z-50 hidden" data-details-modal>
      <div class="modal-backdrop" data-details-modal-backdrop></div>
      <div class="modal-shell">
        <div
          class="modal-panel modal-panel--solid"
          role="dialog"
          aria-modal="true"
          aria-labelledby="details-modal-title"
          data-details-modal-panel
        >
          <div class="modal-header">
            <div>
              <p class="modal-label" data-details-modal-label>Speaker</p>
              <h3 id="details-modal-title" class="modal-title" data-details-modal-title>
                Speaker Details
              </h3>
            </div>
            <button
              type="button"
              class="modal-close"
              aria-label="Close speaker details"
              data-details-modal-close
            >
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M6 18L18 6M6 6l12 12"
                />
              </svg>
            </button>
          </div>
          <div class="modal-body" data-details-modal-body></div>
        </div>
      </div>
    </div>

    <!-- ============================================================
       FOOTER (from src/_partials/footer.html)
       ============================================================ -->
    <footer></footer>

    <script src="/js/presenter-directory.js" defer></script>
    <script src="/js/details-modal.js" defer></script>
  </body>
</html>
